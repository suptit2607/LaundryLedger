name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Build with Gradle
      run: |
        gradle build --stacktrace > build_output.log 2>&1 || true
        echo "=== KOTLIN COMPILATION ERRORS ==="
        grep "^e: " build_output.log || true
        echo "================================="
        echo "=== EXCEPTION START ==="
        grep -A 50 "What went wrong:" build_output.log || true
        echo "---"
        grep -A 50 "Caused by:" build_output.log || true
        echo "=== EXCEPTION END ==="
        grep -q "BUILD SUCCESSFUL" build_output.log || exit 1

    - name: Upload Build Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-log
        path: build_output.log

    - name: Build APK Version
      run: gradle assembleDebug --stacktrace --info

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
